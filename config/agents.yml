# Agent 配置文件
# 定义三个核心 Agent 的职责、提示词和启动方式
# Kimi CLI Agent 模式文档: https://moonshotai.github.io/kimi-cli/zh/customization/agents.html
# Kimi CLI Print 模式文档: https://moonshotai.github.io/kimi-cli/zh/customization/print-mode.html

version: "1.0.0"
description: "TodoList 任务处理 Agent 配置"

# Agent 定义
agents:
  # Agent 1: 任务分析器 - 分析任务并拆分复杂任务
  - id: "task-analyzer"
    name: "任务分析器"
    role: "analyzer"
    description: "分析任务复杂度，将复杂任务拆分为可管理的子任务"
    enabled: true
    priority: 1
    
    # 启动配置：使用 Kimi CLI Agent 模式 + Print 模式
    # Agent 模式文档: https://moonshotai.github.io/kimi-cli/zh/customization/agents.html
    # Print 模式文档: https://moonshotai.github.io/kimi-cli/zh/customization/print-mode.html
    launch_config:
      # 传输方式: stdio | http | sse | cli
      transport: "cli"
      
      # 启动命令
      command: "kimi"
      
      # Agent + Print 模式参数：
      # --agent-file <file>        : 加载自定义 Agent YAML 配置文件
      # --print                    : 启用 Print 模式（非交互、自动审批）
      # --final-message-only       : 仅输出最终消息，跳过工具调用过程
      # -p "<prompt>"              : 传入用户指令
      #
      # Agent 文件结构（version: 1）：
      # agent:
      #   name: agent名称
      #   extend: default           # 继承内置 default Agent
      #   system_prompt_path: ./prompt.md
      #   system_prompt_args:       # 自定义参数（在提示词中用 ${VAR} 引用）
      #     MY_VAR: "值"
      #   subagents:                # 子 Agent 定义
      #     explorer:
      #       path: ./sub.yaml
      #
      # 内置变量（在提示词中用 ${VAR} 引用）：
      # ${KIMI_NOW}                : 当前时间（ISO 格式）
      # ${KIMI_WORK_DIR}           : 工作目录路径
      # ${KIMI_WORK_DIR_LS}        : 工作目录文件列表
      # ${KIMI_AGENTS_MD}          : AGENTS.md 文件内容
      # ${KIMI_SKILLS}             : 加载的 Skills 列表
      args:
        - "--agent-file"                    # 加载自定义 Agent 配置
        - "./config/agents/task-analyst.yaml"
        - "--print"                         # 启用 Print 模式
        - "--final-message-only"            # 仅输出最终消息
        - "-p"                              # 用户指令
        - "{{user_input}}"
      
      # 参数模板（运行时替换）
      arg_templates:
        user_input: "{{input}}"
      
      cwd: "."
      
      env:
        AGENT_ID: "task-analyzer"
        AGENT_ROLE: "analyzer"
        AGENT_FILE: "./config/agents/task-analyst.yaml"
        # Kimi CLI 会自动读取 MOONSHOT_API_KEY 环境变量
      
      timeout: 120
      
      cli_config:
        mode: "single-run"
        input_method: "arg"
        output_format: "markdown"
        success_exit_codes: [0]
        max_output_length: 20000
      
      health_check:
        enabled: false
      
      restart_policy:
        max_restarts: 2
        backoff_multiplier: 2
        initial_delay: 1000
    
    # 简要提示词（Agent 模式下主要使用 system_prompt_path 指定的文件）
    prompt: |
      你是任务分析拆分专家。使用 Task 工具可以调用子 Agent：
      - explorer: 探索项目结构
      - validator: 验证验收标准
      
      每个任务必须满足 SMART-TEST 原则。

  # Agent 2: 任务分配器 - 分配子任务给合适的 Agent 并跟踪状态
  - id: "task-dispatcher"
    name: "任务分配器"
    role: "dispatcher"
    description: "根据子任务特性分配给对应的 Agent 处理，并跟踪更新任务状态"
    enabled: true
    priority: 2
    
    launch_config:
      # HTTP API 模式示例
      transport: "http"
      
      # HTTP 端点配置
      endpoint:
        host: "localhost"
        port: 4003
        base_path: "/api/v1"
      
      # 启动命令（用于启动 HTTP 服务）
      command: "node"
      args:
        - "./dist/agents/task-dispatcher.js"
        - "--port"
        - "4003"
      
      cwd: "./agents"
      
      env:
        AGENT_ID: "task-dispatcher"
        AGENT_ROLE: "dispatcher"
        API_PORT: "4003"
        DISPATCH_STRATEGY: "round-robin"
        QUEUE_SIZE: "100"
      
      timeout: 30
      
      health_check:
        enabled: true
        interval: 30
        url: "http://localhost:4003/health"
      
      restart_policy:
        max_restarts: 3
        backoff_multiplier: 2
        initial_delay: 1000
    
    prompt: |
      你是一个智能任务调度专家。你的职责是：
      
      1. 接收已拆分的子任务列表
      2. 分析每个子任务的特性：
         - 技术栈要求（前端/后端/数据库/运维等）
         - 任务类型（编码/测试/文档/调研等）
         - 复杂度评估
         - 所需技能和工具
      
      3. 将子任务分配给最合适的 Agent：
         - 编码类任务 → 编码 Agent
         - 分析设计类 → 任务分析 Agent
         - 需要进一步拆分 → 重新分配给分析 Agent
      
      4. 管理任务状态流转：
         - 跟踪每个子任务的执行状态（pending/assigned/in-progress/completed/failed）
         - 处理任务阻塞和依赖等待
         - 在子任务完成时更新父任务进度
         - 发现执行偏差时触发重新分配或重新分析
      
      调度原则：
      - 负载均衡：避免单个 Agent 过载
      - 技能匹配：选择最擅长该领域的 Agent
      - 依赖优先：优先调度无依赖或依赖已完成的子任务
      - 动态调整：根据执行反馈优化分配策略
      
      输出格式：
      返回任务分配方案，包含每个子任务的分配结果、预期执行顺序、状态跟踪计划和风险预警。

  # Agent 3: 编码 Agent - 执行具体的编码任务
  - id: "code-agent"
    name: "编码专家"
    role: "coder"
    description: "执行具体的编码实现任务，包括编写代码、单元测试和文档"
    enabled: true
    priority: 3
    
    launch_config:
      # 使用 Kimi CLI Print 模式进行代码生成
      # Print 模式文档: https://moonshotai.github.io/kimi-cli/zh/customization/print-mode.html
      transport: "cli"
      
      command: "kimi"
      
      # Print 模式参数
      # --print: 启用 Print 模式
      # --final-message-only: 仅输出最终消息，跳过工具调用过程
      # --system-prompt: 设置系统提示词
      # -p: 传入用户指令
      args:
        - "--print"
        - "--final-message-only"
        - "--system-prompt"
        - "{{system_prompt}}"
        - "-p"
        - "{{user_prompt}}"
      
      # 参数模板
      arg_templates:
        system_prompt: |
          你是一个资深的全栈开发工程师。请根据需求编写高质量的代码。
          代码要求：
          1. 遵循项目编码规范和最佳实践
          2. 包含必要的错误处理和日志
          3. 提供简要的实现说明
        user_prompt: |
          请根据以下需求编写代码：
          {{task_text}}
          
          要求：
          1. 遵循项目编码规范
          2. 包含必要的单元测试
          3. 提供简要的实现说明
        task_text: "{{input}}"
        context_files: "{{relevant_files}}"
      
      cwd: "."
      
      env:
        AGENT_ID: "code-agent"
        AGENT_ROLE: "coder"
        CODE_STYLE: "strict"
        AUTO_TEST: "true"
      
      timeout: 120
      
      cli_config:
        mode: "single-run"
        input_method: "arg"
        output_format: "markdown"         # 代码通常以 markdown 代码块形式输出
        success_exit_codes: [0]
        max_output_length: 20000
        
        # 代码提取配置
        code_extraction:
          enabled: true
          # 从 markdown 代码块中提取代码
          extract_from_markdown: true
          # 支持的代码块语言
          languages: ["typescript", "javascript", "python", "tsx", "jsx", "json", "css", "scss", "html", "yaml", "sql"]
      
      health_check:
        enabled: false
      
      restart_policy:
        max_restarts: 2
        backoff_multiplier: 2
        initial_delay: 1000
    
    prompt: |
      你是一个资深的全栈开发工程师。你的职责是：
      
      1. 接收分配给你的编码任务，理解需求和验收标准
      2. 制定实现方案：
         - 设计代码结构和模块划分
         - 选择合适的技术方案和算法
         - 识别需要创建或修改的文件
         - 规划测试策略
      
      3. 执行编码工作：
         - 编写清晰、可维护的代码
         - 遵循项目编码规范和最佳实践
         - 添加必要的注释和文档
         - 实现单元测试确保代码质量
      
      4. 代码质量要求：
         - 代码符合 SOLID 原则
         - 适当的错误处理和日志记录
         - 性能考虑（避免明显的性能瓶颈）
         - 安全性考虑（输入验证、防止注入等）
      
      5. 交付物：
         - 完整的源代码
         - 单元测试代码
         - 简要的实现说明文档
         - 代码变更清单
      
      技术栈：
      - 前端：React, TypeScript, Next.js, Tailwind CSS
      - 后端：Node.js, Express
      - 数据库：SQLite
      - 测试：Jest, React Testing Library
      
      编码原则：
      - 优先使用现有项目的模式和约定
      - 保持代码简洁，避免过度工程
      - 编写自解释的代码，注释说明"为什么"而非"是什么"
      - 确保测试覆盖核心逻辑

# 全局配置
global:
  # 默认执行模式: sequential(顺序) | parallel(并行) | auto(自动)
  execution_mode: "auto"
  
  # 最大重试次数
  max_retries: 3
  
  # 任务超时时间（分钟）
  task_timeout: 30
  
  # 是否启用日志记录
  enable_logging: true
  
  # Agent 间通信方式: direct(直接) | queue(队列) | event(事件)
  communication_mode: "event"
  
  # Kimi CLI Print 模式全局默认配置
  # Print 模式文档: https://moonshotai.github.io/kimi-cli/zh/customization/print-mode.html
  # 
  # Print 模式特点：
  # 1. 非交互：执行完指令后自动退出，适合脚本调用
  # 2. 自动审批：隐式启用 --yolo 模式，所有操作自动批准
  # 3. 文本输出：AI 回复输出到 stdout
  #
  # 常用参数组合：
  # - 基本用法: kimi --print -p "指令"
  # - 仅最终消息: kimi --print --final-message-only -p "指令"
  # - 快捷方式: kimi --quiet -p "指令"（等同于上一条）
  # - JSON 输出: kimi --print --output-format=stream-json -p "指令"
  # - 通过 stdin: echo "指令" | kimi --print
  # - 使用 Agent: kimi --agent-file ./agent.yaml --print -p "指令"
  cli_defaults:
    # 默认 CLI 命令
    default_command: "kimi"
    
    # 默认参数
    # 推荐使用 --print --final-message-only 获得干净的输出
    # 如需 JSON 格式，使用 --print --output-format=stream-json
    default_args:
      - "--print"
      - "--final-message-only"
    
    # 环境变量前缀（自动注入 AGENT_ID 等）
    env_prefix: "AGENT_"
    
    # 临时文件目录（用于传递大输入或存储中间结果）
    temp_dir: "./tmp/agents"
